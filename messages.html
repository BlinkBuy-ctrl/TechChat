<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techychat – Chats</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <meta name="theme-color" content="#6c63ff">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>
<body>
<nav class="top-nav">
  <span class="logo">Techychat</span>
  <div class="nav-icons">
    <button class="nav-icon-btn" onclick="location.href='notifications.html'" style="position:relative">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge badge-notif hidden" style="position:absolute;top:6px;right:6px"></span>
    </button>
    <button class="nav-icon-btn" onclick="Theme.toggle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</nav>

<main class="main">
  <div class="container">
    <div class="section-header">
      <h1 class="section-title">Chats</h1>
      <button class="btn btn-sm btn-ghost" onclick="location.href='friends.html'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
    </div>

    <div class="search-input-wrapper mb-4">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="input" placeholder="Search conversations…" oninput="filter(this.value)">
    </div>

    <div id="skeleton">
      ${[1,2,3,4].map(() => `<div class="chat-item"><div class="skeleton rounded-full" style="width:48px;height:48px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px"><div class="skeleton" style="height:13px;width:55%"></div><div class="skeleton" style="height:11px;width:75%"></div></div></div>`).join('')}
    </div>
    <div id="list"></div>
    <div id="empty" class="empty-state hidden">
      <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <p style="font-weight:600;margin-bottom:6px">No conversations yet</p>
      <p class="text-muted text-sm">Add friends to start chatting</p>
      <button class="btn btn-primary mt-4" onclick="location.href='friends.html'">Find Friends</button>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="messages.html" class="active" style="position:relative">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="badge badge-msg hidden" style="position:absolute;top:4px;right:8px"></span>
    Chats
  </a>
  <a href="posts.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>Posts</a>
  <a href="friends.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Friends</a>
  <a href="notifications.html" style="position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge badge-notif hidden" style="position:absolute;top:4px;right:8px"></span>Alerts</a>
  <a href="profile.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Me</a>
</nav>

<div id="tc-toasts" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
let me = null, all = [];

async function init() {
  const s = await Auth.requireAuth('auth.html');
  if (!s) return;
  me = s.user;
  Idle.init();
  await load();
  updateBadges();
  // Realtime: refresh list on new message
  supabase.channel('msg-list')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${me.id}` },
      () => { load(); updateBadges(); })
    .subscribe();
}

async function load() {
  const { data: friendRows } = await supabase.from('friends').select('friend_id').eq('user_id', me.id);
  const skel = document.getElementById('skeleton');
  if (skel) skel.remove();
  if (!friendRows?.length) { document.getElementById('empty').classList.remove('hidden'); return; }

  all = await Promise.all(friendRows.map(async ({ friend_id: fid }) => {
    const [{ data: p }, { data: msgs }, { count: unread }] = await Promise.all([
      supabase.from('profiles').select('id,display_name,profile_photo_url,status').eq('id', fid).single(),
      supabase.from('messages')
        .select('content,image_url,created_at,sender_id')
        .or(`and(sender_id.eq.${me.id},receiver_id.eq.${fid}),and(sender_id.eq.${fid},receiver_id.eq.${me.id})`)
        .order('created_at', { ascending: false }).limit(1),
      supabase.from('messages').select('id', { count: 'exact', head: true })
        .eq('sender_id', fid).eq('receiver_id', me.id).eq('is_read', false)
    ]);
    return { p, last: msgs?.[0] || null, unread: unread || 0 };
  }));

  all = all.filter(c => c.p).sort((a, b) => {
    if (!a.last && !b.last) return 0;
    if (!a.last) return 1; if (!b.last) return -1;
    return new Date(b.last.created_at) - new Date(a.last.created_at);
  });
  render(all);
}

function render(chats) {
  const list  = document.getElementById('list');
  const empty = document.getElementById('empty');
  if (!chats.length) { empty.classList.remove('hidden'); list.innerHTML = ''; return; }
  empty.classList.add('hidden');
  list.innerHTML = chats.map(({ p, last, unread }) => {
    const preview = last ? (last.image_url ? '📷 Photo' : (last.content || '').slice(0, 55)) : '<span style="color:var(--text3)">Say hi!</span>';
    const isOnline = p.status === 'online';
    return `<div class="chat-item" onclick="location.href='chat.html?uid=${p.id}'">
      <div style="position:relative">${avatar(p, 48)}<span class="dot ${isOnline?'dot-green':'dot-gray'}" style="position:absolute;bottom:0;right:0"></span></div>
      <div class="chat-info">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:.95rem">${esc(p.display_name)}</span>
          <span class="time">${last ? timeAgo(last.created_at) : ''}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="preview ${unread ? 'unread-preview' : ''}">${preview}</span>
          ${unread ? `<span class="badge">${unread}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filter(q) {
  render(q ? all.filter(c => c.p?.display_name?.toLowerCase().includes(q.toLowerCase())) : all);
}

init();
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
</body>
</html>
