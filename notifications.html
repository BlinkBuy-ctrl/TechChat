<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techychat – Notifications</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <meta name="theme-color" content="#6c63ff">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <style>
    .ni-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ni-msg{background:rgba(108,99,255,.15);color:var(--accent)}
    .ni-like{background:rgba(239,68,68,.15);color:var(--red)}
    .ni-post{background:rgba(56,189,248,.15);color:var(--accent3)}
    .ni-req{background:rgba(34,197,94,.15);color:var(--green)}
  </style>
</head>
<body>
<nav class="top-nav">
  <span class="logo">Techychat</span>
  <div class="nav-icons">
    <button class="nav-icon-btn" onclick="markAll()" title="Mark all read">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="nav-icon-btn" onclick="Theme.toggle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</nav>

<main class="main">
  <div class="container">
    <div class="section-header">
      <h1 class="section-title">Notifications</h1>
      <span id="unread-lbl" class="text-muted text-sm"></span>
    </div>
    <div id="skeleton">
      ${[1,2,3,4].map(()=>`<div class="notif-item"><div class="skeleton rounded-full" style="width:44px;height:44px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px"><div class="skeleton" style="height:12px;width:65%"></div><div class="skeleton" style="height:10px;width:38%"></div></div></div>`).join('')}
    </div>
    <div id="list"></div>
    <div id="empty" class="empty-state hidden">
      <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <p style="font-weight:600;margin-bottom:6px">All caught up!</p>
      <p class="text-muted text-sm">No notifications yet.</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="messages.html" style="position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="badge badge-msg hidden" style="position:absolute;top:4px;right:8px"></span>Chats</a>
  <a href="posts.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>Posts</a>
  <a href="friends.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Friends</a>
  <a href="notifications.html" class="active" style="position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge badge-notif hidden" style="position:absolute;top:4px;right:8px"></span>Alerts</a>
  <a href="profile.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Me</a>
</nav>

<div id="tc-toasts" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
const ICONS = {
  new_message:    {cls:'ni-msg',  svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`},
  post_like:      {cls:'ni-like', svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`},
  post_comment:   {cls:'ni-post', svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`},
  new_post:       {cls:'ni-post', svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>`},
  friend_request: {cls:'ni-req',  svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`},
  friend_accept:  {cls:'ni-req',  svg:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>`}
};

let me = null;

async function init() {
  const s = await Auth.requireAuth('auth.html');
  if (!s) return;
  me = s.user; Idle.init();
  await load();
  subscribe();
  updateBadges();
}

async function load() {
  const { data: notifs } = await supabase.from('notifications')
    .select('*,profiles!from_user_id(id,display_name,profile_photo_url)')
    .eq('user_id', me.id).order('created_at',{ascending:false}).limit(60);

  document.getElementById('skeleton')?.remove();
  const el    = document.getElementById('list');
  const empty = document.getElementById('empty');
  if (!notifs?.length) { empty.classList.remove('hidden'); return; }

  const unread = notifs.filter(n=>!n.is_read).length;
  if (unread) document.getElementById('unread-lbl').textContent = `${unread} unread`;
  el.innerHTML = notifs.map(n=>row(n)).join('');
  setTimeout(() => markAll(false), 1500);
}

function row(n) {
  const ic  = ICONS[n.type] || ICONS['new_message'];
  const p   = n.profiles||{};
  const av  = p.profile_photo_url
    ? `<img src="${p.profile_photo_url}" class="avatar" width="44" height="44">`
    : `<div class="ni-icon ${ic.cls}">${ic.svg}</div>`;
  const lnk = n.link ? `onclick="location.href='${n.link}'"` : '';
  return `<div class="notif-item ${n.is_read?'':'unread'}" id="n-${n.id}" ${lnk} style="cursor:${n.link?'pointer':'default'}">
    <div style="position:relative;flex-shrink:0">${av}${!n.is_read?`<span style="position:absolute;bottom:2px;right:2px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)"></span>`:''}</div>
    <div class="notif-body">
      <div style="font-size:.88rem;line-height:1.5"><strong>${esc(p.display_name||'Someone')}</strong> ${esc(n.message||'')}</div>
      <div class="notif-time" style="margin-top:4px">${timeAgo(n.created_at)}</div>
    </div>
  </div>`;
}

async function markAll(toast = true) {
  await supabase.from('notifications').update({is_read:true}).eq('user_id',me.id).eq('is_read',false);
  document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread'));
  document.getElementById('unread-lbl').textContent = '';
  updateBadges();
  if (toast) Toast.success('All marked as read');
}

function subscribe() {
  supabase.channel('notif-live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${me.id}`},({new:n})=>{
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('list').insertAdjacentHTML('afterbegin', row(n));
      updateBadges();
    }).subscribe();
}

init();
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
</body>
</html>
